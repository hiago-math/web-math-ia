services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=mathia_network"
      - "--entrypoints.web.address=:80"
    environment:
      - DOCKER_API_VERSION=1.52
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - mathia_network
    restart: unless-stopped

networks:
  mathia_network:
    external: true
    name: mathia_network
